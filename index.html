<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Jumper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WXBP6CPKLP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // ここも測定IDに書き換えます
      gtag('config', 'G-WXBP6CPKLP');
    </script>
    
    <style>
        body { background-color: #f0f2f5; font-family: "Helvetica Neue", Arial, sans-serif; padding: 20px; }
        .main-card {
            max-width: 600px; margin: 0 auto;
            background: white; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
        }
        .header-title { color: #004d26; font-weight: bold; text-align: center; margin-bottom: 20px; }
        
        /* ボタンのスタイル調整 */
        .btn-earth {
            background-color: #1a73e8; color: white; font-weight: bold;
            width: 100%; padding: 12px; font-size: 1.1rem;
            border-radius: 10px; border: none; margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn-earth:hover { background-color: #1359c4; color: white; transform: translateY(-2px); }
        
        .btn-maps-3d {
            background-color: #fbbc04; color: #333; font-weight: bold;
            width: 100%; padding: 15px; font-size: 1.2rem;
            border-radius: 10px; border: none; margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn-maps-3d:hover { background-color: #e0a800; transform: translateY(-2px); }

        .btn-maps {
            background-color: #34a853; color: white; font-weight: bold;
            width: 100%; padding: 12px; font-size: 1.1rem;
            border-radius: 10px; border: none; margin-bottom: 10px; /* 下部余白を追加 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn-maps:hover { background-color: #2d8e47; color: white; transform: translateY(-2px); }
        
        /* ★追加★ 地図切出アプリ用ボタンのスタイル */
        .btn-rinpan {
            background-color: #20c997; color: white; font-weight: bold;
            width: 100%; padding: 12px; font-size: 1.1rem;
            border-radius: 10px; border: none; margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn-rinpan:hover { background-color: #1aa179; color: white; transform: translateY(-2px); }

        .input-group-text { width: 60px; justify-content: center; background-color: #e9ecef; font-weight: bold; }
        .help-text { font-size: 0.85rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <h3 class="header-title">🌏 撮影場所へジャンプ！</h3>
        <p class="text-center text-muted">緯度・経度・方位（撮影方向）を入力してください。<br>グーグルアースでは画面上部が’撮影方向’になります。</p>

        <div class="mb-3">
            <label class="form-label fw-bold">緯度</label>
            <div class="input-group">
                <span class="input-group-text">N</span>
                <input type="number" id="latInput" class="form-control" placeholder="例: 35.12345" step="0.00001">
            </div>
            <div class="help-text">※’度表記’で入力</div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">経度</label>
            <div class="input-group">
                <span class="input-group-text">E</span>
                <input type="number" id="lonInput" class="form-control" placeholder="例: 136.12345" step="0.00001">
            </div>
            <div class="help-text">※’度表記’で入力</div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">方位（撮影方向）</label>
            <div class="input-group">
                <span class="input-group-text">角度</span>
                <input type="number" id="headInput" class="form-control" placeholder="例: 90" step="1">
            </div>
            <div class="help-text">※必須ではありません</div>
        </div>

        <hr class="my-4">
        <button class="btn-earth" onclick="jumpToEarth()">
            🚀 Google Earth (3D地図・ピンなし)
        </button>
        
        <button class="btn-maps" onclick="jumpToMaps()">
            🗺️ Google Maps (2D地図・ピンあり)
        </button>

        <button class="btn-rinpan" onclick="jumpToMapCut()">
            🌲 地図切出サイト (林班図など・ピンあり)
        </button>
        
        <div class="help-text text-center mt-3" style="font-size: 0.75rem;">
        </div>
    </div>
</div>

<script>
    // 1. Google Maps (3D航空写真 + ピンあり + 方位指定)
    function jumpToMaps3D() {
        const lat = document.getElementById('latInput').value;
        const lon = document.getElementById('lonInput').value;
        const heading = document.getElementById('headInput').value || 0;

        if (!lat || !lon) {
            alert("緯度と経度を入力してください！");
            return;
        }

        // 公式のGoogle Maps URLフォーマットに修正
        const url = `https://www.google.com/maps/place/${lat},${lon}/@${lat},${lon},250a,75y,${heading}h/data=!3m1!1e3`;
        window.open(url, '_blank');
    }

    // 2. Google Earth (3D景観 + 方位指定 + 検索ピン)
    function jumpToEarth() {
        const lat = document.getElementById('latInput').value;
        const lon = document.getElementById('lonInput').value;
        const heading = document.getElementById('headInput').value || 0; 

        if (!lat || !lon) {
            alert("緯度と経度を入力してください！");
            return;
        }

        // 検索パラメータを入れてピンを落とす試み
        const url = `https://earth.google.com/web/search/${lat},${lon}/@${lat},${lon},150a,200d,75y,${heading}h,0t,0r`;
        window.open(url, '_blank');
    }

    // 3. Google Maps (2D地図 + ピンあり)
    function jumpToMaps() {
        const lat = document.getElementById('latInput').value;
        const lon = document.getElementById('lonInput').value;

        if (!lat || !lon) {
            alert("緯度と経度を入力してください！");
            return;
        }

        // 確実にピンを立てるための標準的なMapsのURLフォーマット
        const url = `https://www.google.com/maps/place/${lat},${lon}/@${lat},${lon},18z`;
        window.open(url, '_blank');
    }

    // ★追加★ 4. 地図切出アプリへのジャンプ処理
    // ★修正版★ 4. 地図切出アプリへのジャンプ処理
    function jumpToMapCut() {
        const lat = document.getElementById('latInput').value;
        const lon = document.getElementById('lonInput').value;

        if (!lat || !lon) {
            alert("緯度と経度を入力してください！");
            return;
        }

        // ▼大修正ポイント▼
        // 自分自身に飛ばないよう、ここに「地図切出アプリ」の【実際の公開URL】を指定します。
        // （以下の https://～ の部分を、高田さんの実際の地図切出アプリのURLに書き換えてください）
        
        const mapCutUrl = "https://takada291.github.io/map-clip/";
        
        // ※もし、撮影場所アプリと同じフォルダ内に「map_cut.html」などの別名で保存している場合は、
        // const mapCutUrl = "map_cut.html"; 
        // のようにファイル名だけを指定します。

        const url = `${mapCutUrl}?lat=${lat}&lon=${lon}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
