<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Jumper v1.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WXBP6CPKLP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // ここも測定IDに書き換えます
      gtag('config', 'G-WXBP6CPKLP');
    </script>
    
    <style>
        body { background-color: #f0f2f5; font-family: "Helvetica Neue", Arial, sans-serif; padding: 20px; }
        .main-card {
            max-width: 600px; margin: 0 auto;
            background: white; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
        }
        .header-title { color: #004d26; font-weight: bold; text-align: center; margin-bottom: 20px; }
        .btn-earth {
            background-color: #1a73e8; color: white; font-weight: bold;
            width: 100%; padding: 15px; font-size: 1.2rem;
            border-radius: 10px; border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn-earth:hover { background-color: #1359c4; color: white; transform: translateY(-2px); }
        .btn-maps {
            background-color: #34a853; color: white; font-weight: bold;
            width: 100%; padding: 10px; margin-top: 10px;
            border-radius: 10px; border: none;
        }
        .btn-maps:hover { background-color: #2d8e47; color: white; }
        .input-group-text { width: 60px; justify-content: center; background-color: #e9ecef; font-weight: bold; }
        .help-text { font-size: 0.85rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <h3 class="header-title">🌏 撮影場所へジャンプ！</h3>
        <p class="text-center text-muted">電子黒板の写真に書かれた<br>緯度・経度・方位を入力してください</p>

        <div class="mb-3">
            <label class="form-label fw-bold">緯度 (Latitude)</label>
            <div class="input-group">
                <span class="input-group-text">N</span>
                <input type="number" id="latInput" class="form-control" placeholder="例: 35.12345" step="0.00001">
            </div>
            <div class="help-text">※黒板の「N」の後ろの数字</div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">経度 (Longitude)</label>
            <div class="input-group">
                <span class="input-group-text">E</span>
                <input type="number" id="lonInput" class="form-control" placeholder="例: 136.12345" step="0.00001">
            </div>
            <div class="help-text">※黒板の「E」の後ろの数字</div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">方位 (Heading)</label>
            <div class="input-group">
                <span class="input-group-text">角度</span>
                <input type="number" id="headInput" class="form-control" placeholder="例: 90" step="1">
            </div>
            <div class="help-text">※黒板の「( )」の中の数字 (0〜360)</div>
        </div>

        <hr class="my-4">

        <button class="btn-earth" onclick="jumpToEarth()">
            🚀 Google Earth (3D)
        </button>
        
        <button class="btn-maps" onclick="jumpToMaps()">
            🗺️ Google Maps (2D)
        </button>

    </div>
</div>

<script>
    function jumpToEarth() {
        const lat = document.getElementById('latInput').value;
        const lon = document.getElementById('lonInput').value;
        const heading = document.getElementById('headInput').value || 0; // 空欄なら北(0)

        if (!lat || !lon) {
            alert("緯度と経度を入力してください！");
            return;
        }

        // Google Earth WebのURLフォーマット
        // @緯度,経度,高度a,カメラ距離d,チルト角y,方位h,ロールt
        // チルト(y)を75度にして、少し見下ろす感じにしています
        const url = `https://earth.google.com/web/@${lat},${lon},100a,200d,75y,${heading}h,0t,0r`;
        
        window.open(url, '_blank');
    }

    function jumpToMaps() {
        const lat = document.getElementById('latInput').value;
        const lon = document.getElementById('lonInput').value;

        if (!lat || !lon) {
            alert("緯度と経度を入力してください！");
            return;
        }

        // Google MapsのURL
        const url = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
